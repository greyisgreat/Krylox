<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Krylox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg"></div>

<header>
  <h1>KRYLOX</h1>

  <input id="search" placeholder="Search games...">

  <button onclick="toggleFavorites()">⭐ Favorites</button>
</header>

<section class="top">
  <h2>🧠 Continue Playing</h2>
  <div id="continue"></div>
</section>

<main id="gameGrid"></main>

<div id="player" class="hidden">
  <button onclick="closeGame()">✕</button>
  <iframe id="frame"></iframe>
</div>

<script src="app.js"></script>
</body>
</html>
